# Values for Rancher Helm Chart
# Admiral Bash's Island Adventure - INTERNAL LAB DEPLOYMENT
#
# Decision: This cluster runs on an internal (10.x.y.z) VM with no public
# reachability. Let's Encrypt HTTP-01 cannot validate, and we already have a
# self-signed wildcard cert (certs/tls.crt) loaded as the `wildcard-tls` secret
# in the admin-tools namespace. We let the Gateway API HTTPRoute in
# k8s/core-tools/gateway-routes.yaml (rancher-route) handle TLS termination at
# the cluster edge and route HTTP-only traffic to the rancher Service.
#
# This keeps the TLS story portable: any institution that clones this repo and
# runs `just init && just bootstrap-server && just deploy-core && just deploy-rancher`
# gets a working Rancher under THEIR ${LAB_DOMAIN} without needing public DNS.
#
# Install command:
#   helm repo add rancher-stable https://releases.rancher.com/server-charts/stable
#   helm repo update
#   helm upgrade --install rancher rancher-stable/rancher \
#     --namespace cattle-system --create-namespace \
#     --values k8s/rancher/rancher-values.yaml
#
# PREREQUISITES:
#   1. wildcard-tls secret in admin-tools namespace (just push-cert)
#   2. main-gateway + rancher-route applied (just deploy-core)

hostname: rancher.${LAB_DOMAIN}

replicas: 1

# Injected from lab.env at deploy time by `just deploy-rancher` (envsubst).
bootstrapPassword: "${RANCHER_BOOTSTRAP_PASSWORD}"

# ── TLS termination handled by Gateway API ────────────────────
# `tls: external` tells Rancher its public endpoint is HTTPS but the TLS layer
# is owned by something outside the chart — in our case the main-gateway in
# admin-tools. Disabling the chart's own Ingress prevents conflicts with the
# HTTPRoute that already routes rancher.${LAB_DOMAIN} → rancher:80.
tls: external
ingress:
  enabled: false

# ── Disable Rancher's internal CA management ──────────────────
# With external TLS we don't want Rancher trying to manage its own CA bundle.
additionalTrustedCAs: false

# Single-node resource limits
# HANDOFF NOTE (2026-06-02): raised memory 1Gi->3Gi (req 512Mi->1Gi) and cpu
# limit 1->2 after Rancher crashlooped for ~2 days. Root cause was a stale
# v1.ext.cattle.io APIService stalling startup discovery, but the TIGHT 1Gi limit
# + 5s liveness probe (below) turned that transient into a death spiral: a
# briefly-slow /healthz tripped the probe and the kubelet killed a Rancher that
# was actually coming up. Rancher v2.14 wants ~2Gi+ headroom on this shared
# 4-vCPU control-plane node. See the rancher-no-available-server runbook.
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 3Gi

# ── Probe tolerance (HANDOFF NOTE 2026-06-02) ─────────────────
# The default liveness probe (timeout 5s, failureThreshold 5) kills Rancher if
# /healthz is slow to answer for ~2.5 min — which is exactly what happened during
# the stale-discovery stall, producing a 100-restart crashloop nobody noticed for
# 2 days. These overrides give a slow-but-recovering Rancher room to breathe
# instead of being executed: longer timeouts, more failures tolerated, and a
# startup window stretched to ~4.5 min. All three keys are chart-supported.
startupProbe:
  timeoutSeconds: 15
  periodSeconds: 15
  failureThreshold: 18   # ~4.5 min to finish starting before liveness takes over
livenessProbe:
  timeoutSeconds: 15
  periodSeconds: 30
  failureThreshold: 8    # ~4 min of slow /healthz tolerated before a restart
readinessProbe:
  timeoutSeconds: 15
  periodSeconds: 30
  failureThreshold: 8    # don't flap out of Service endpoints under class load

# ── SSO via Dex (OIDC) — UI / AuthConfig STEP ─────────────────
# Rancher auth providers are NOT configurable through Helm values. After
# `just deploy-rancher`, enable Generic OIDC in the Rancher UI
# (Users & Authentication → Auth Provider → Generic OIDC) with:
#   Client ID:        rancher
#   Client Secret:    rancher-oidc-secret   (matches dex.yaml staticClients)
#   Private/Issuer:   https://sso.${LAB_DOMAIN}
#   Auth Endpoint:    https://sso.${LAB_DOMAIN}/auth
#   Token Endpoint:   https://sso.${LAB_DOMAIN}/token
#   UserInfo:         https://sso.${LAB_DOMAIN}/userinfo
#   Redirect URL:     https://rancher.${LAB_DOMAIN}/verify-auth
#   Scopes:           openid profile email groups
# This is the one "click-ops" integration in the stack — see the Day 3 SSO
# walkthrough for the exact form fields and the AuthConfig alternative.

# ── Email notifier → Mailpit (UI / click-ops STEP) ────────────
# Rancher's SMTP notifier is NOT configurable through Helm values either. After
# `just deploy-rancher`, add an SMTP Notifier so cluster alerts reach Mailpit:
#   Cluster → Monitoring/Alerting → Notifiers → Add → SMTP, with:
#     SMTP Server:   mailpit.admin-tools.svc.cluster.local
#     Port:          1025
#     Sender:        noreply@${LAB_DOMAIN}
#     Default Recipient: admiral@${LAB_DOMAIN}
#     Use TLS:       OFF        (Mailpit speaks plain SMTP on :1025)
#     Auth:          none       (no username/password)
# Rancher runs in cattle-system; Mailpit is in admin-tools, so the cross-namespace
# Service FQDN above is required — the short `mailpit` name won't resolve here.
# Hit "Test" in the notifier dialog to drop a message straight into the inbox.
