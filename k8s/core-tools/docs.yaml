apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs-hub
  namespace: admin-tools
  labels:
    app: docs-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs-hub
  template:
    metadata:
      labels:
        app: docs-hub
    spec:
      initContainers:
      - name: git-clone
        image: alpine/git:latest
        command:
          - /bin/sh
          - -c
          - |
            git clone https://github.com/your-org/NITIC-seminar.git /tmp/repo
            cp -r /tmp/repo/docs/* /docs/
            # Init Docsify index.html if it does not exist
            if [ ! -f /docs/index.html ]; then
              wget -qO /docs/index.html https://raw.githubusercontent.com/docsifyjs/docsify/master/index.html
            fi
        volumeMounts:
        - name: docs-volume
          mountPath: /docs
      containers:
      - name: docsify
        # A simple python webserver or Nginx works since Docsify is purely client-side HTML
        image: nginx:alpine
        volumeMounts:
        - name: docs-volume
          mountPath: /usr/share/nginx/html
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: docs-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: docs-hub
  namespace: admin-tools
spec:
  selector:
    app: docs-hub
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs-ingress
  namespace: admin-tools
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - host: docs.admin.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: docs-hub
            port:
              number: 80
