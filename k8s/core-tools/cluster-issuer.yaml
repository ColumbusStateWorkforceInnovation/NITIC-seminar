# [Boatswain] Let's Encrypt ClusterIssuer
# Admiral Bash's Island Adventure - Production TLS
#
# CURRENT STATUS (2026-05-20): UNUSED on internal-VM deployments.
# The NITIC 2026 seminar runs on an internal 10.x VM with no public reachability,
# so HTTP-01 validation cannot complete. All TLS is handled by the self-signed
# wildcard cert in `certs/tls.crt` loaded as the `wildcard-tls` secret. This
# file remains in deploy-core for portability — any institution that clones the
# repo and runs against a *public* server can use these issuers immediately.
#
# Apply AFTER cert-manager is installed and the DNS record for
# rancher.${LAB_DOMAIN} is pointing at the server's public IP.
#
# Apply command:
#   kubectl apply -f k8s/core-tools/cluster-issuer.yaml
#
# Verify:
#   kubectl get clusterissuer letsencrypt-prod -o wide

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production endpoint
    server: https://acme-v02.api.letsencrypt.org/directory
    # CHANGE THIS to the admin email for cert expiry notifications
    email: ${LAB_ADMIN_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # HTTP-01 solver: Gateway API dynamically attaches HTTPRoutes to main-gateway
      - http01:
          gatewayHTTPRoute:
            parentRefs:
            - name: main-gateway
              namespace: admin-tools
              kind: Gateway

---
# Staging issuer for testing (avoids rate limits during dev)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ${LAB_ADMIN_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
            - name: main-gateway
              namespace: admin-tools
              kind: Gateway
