# Values for loki-stack helm chart (Grafana + Loki + Promtail)
# Optimized for local k3d

loki:
  enabled: true
  isDefault: true
  persistence:
    enabled: true
    size: 2Gi
  config:
    auth_enabled: false

promtail:
  enabled: true
  config:
    logLevel: info

grafana:
  enabled: true
  # Injected from lab.env at deploy time by `just deploy-loki` (envsubst).
  adminPassword: "${GRAFANA_ADMIN_PASSWORD}"
  # Decision: Ingress generation is disabled. We manually define HTTPRoute objects
  # to demonstrate the Gateway API paradigm.
  ingress:
    enabled: false
    path: /
  sidecar:
    datasources:
      enabled: true
  # ── SSO via Dex (OIDC) ────────────────────────────────────
  # Grafana's generic_oauth connector — points at our Dex client `grafana`.
  "grafana.ini":
    server:
      root_url: https://grafana.${LAB_DOMAIN}
    # ── Alert mail → Mailpit ──────────────────────────────────
    # Grafana alert notifications go to Mailpit (same admin-tools namespace; FQDN
    # used for uniformity). Plain SMTP on :1025 — no TLS, no auth. skip_verify is
    # belt-and-suspenders since there's no TLS to verify anyway.
    smtp:
      enabled: true
      host: "mailpit.admin-tools.svc.cluster.local:1025"
      from_address: "noreply@${LAB_DOMAIN}"
      from_name: "Grafana (Lab)"
      skip_verify: true
    "auth.generic_oauth":
      enabled: true
      name: Dex
      client_id: grafana
      client_secret: grafana-oidc-secret
      scopes: "openid profile email groups"
      auth_url: https://sso.${LAB_DOMAIN}/auth
      token_url: https://sso.${LAB_DOMAIN}/token
      api_url: https://sso.${LAB_DOMAIN}/userinfo
      # Dex uses the self-signed lab CA — skip verification inside the closed cluster.
      tls_skip_verify_insecure: true
      allow_sign_up: true
      # Map the Dex 'instructors' group to Grafana Admin, everyone else to Viewer.
      role_attribute_path: "contains(groups[*], 'instructors') && 'Admin' || 'Viewer'"
