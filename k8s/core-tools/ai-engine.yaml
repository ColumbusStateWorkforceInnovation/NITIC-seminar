# Local AI Engine Infrastructure
# Decision: We deploy Ollama to host the model locally (free, secure) and LiteLLM to act
# as an API gateway. This provides an OpenAI-compatible endpoint that enforces authentication.
# Both services run within the cluster to eliminate external internet dependency for AI labs.

---
# PVC for Ollama model storage — persists the pulled model across pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: admin-tools
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path   # k3s default; lands on the 256GB data disk
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: admin-tools
data:
  config.yaml: |
    model_list:
      - model_name: ${AI_MODEL}
        # Decision: Route traffic internally to the Ollama service
        litellm_params:
          model: ollama/${AI_MODEL}
          api_base: http://ollama:11434
    
    general_settings:
      # Decision: Require API keys for tracking usage and securing the endpoint.
      master_key: "${AI_API_KEY}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: admin-tools
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Pin to the GPU node. After `just bootstrap-agent` adds a CPU worker,
      # this nodeSelector is what stops Ollama from drifting onto a node
      # without a T4 (where it would fall back to CPU inference and tank).
      # The label is applied by `just bootstrap-agent`. In LOCAL k3d mode the
      # `deploy-core` recipe also strips this (along with runtimeClassName)
      # since there's only one node.
      nodeSelector:
        node-role: gpu
      runtimeClassName: nvidia   # GPU node (1× Tesla T4); `deploy-core` strips this in LOCAL k3d mode
      containers:
      - name: ollama
        # Decision: Use the official Ollama image to serve the local LLM
        # (default: gemma3:4b — see lab.env / AI_MODEL). Any Ollama-supported
        # tag works; just `just pull-model <tag>` after deploy.
        # The ollama/ollama image is CUDA-capable — no image change for GPU.
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        # GPU mode: the model is offloaded to the T4's 16GB VRAM, so the pod's
        # CPU/RAM footprint stays small. The nvidia.com/gpu resource goes in
        # limits ONLY — k8s mirrors it to requests automatically. The node has
        # just 4 vCPU (shared with Harbor, Gitea, Rancher, etc.), so the CPU
        # limit is kept modest. Needs `just deploy-gpu-plugin` applied first.
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: "8Gi"
            cpu: "2000m"
          requests:
            memory: "4Gi"
            cpu: "1000m"
        volumeMounts:
        - name: ollama-models
          mountPath: /root/.ollama
      volumes:
      - name: ollama-models
        # Use a PVC so the model persists across pod restarts
        persistentVolumeClaim:
          claimName: ollama-models

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: admin-tools
spec:
  selector:
    app: ollama
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: admin-tools
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
      - name: litellm
        # Decision: Use litellm to translate OpenAI API requests into Ollama requests.
        image: ghcr.io/berriai/litellm:main-latest
        args:
        - "--config"
        - "/app/config.yaml"
        ports:
        - containerPort: 4000
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.yaml
          subPath: config.yaml
      volumes:
      - name: config-volume
        configMap:
          name: litellm-config

---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: admin-tools
spec:
  selector:
    app: litellm
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
  type: ClusterIP
