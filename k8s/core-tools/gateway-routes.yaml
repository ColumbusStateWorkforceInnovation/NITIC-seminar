# [Boatswain] The App Team's Routing Definitions
#
# Decision: Since we disabled the built-in legacy Ingress objects in our Helm charts,
# we manually define HTTPRoute objects here. This physically demonstrates the
# separation of concerns: Infrastructure manages the Gateway, Apps manage the HTTPRoute.
#
# All routes attach to the main-gateway in admin-tools namespace.
# The gateway handles both HTTP (80) and HTTPS (443) via the wildcard-tls cert.
# Each route needs only one parentRef — the gateway listener selection is automatic.
#
# ⚠️  PORTABILITY: Do NOT apply this file directly with kubectl.
# Use: just deploy-core   (which pipes through envsubst to inject LAB_DOMAIN)

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
  - name: main-gateway
    namespace: admin-tools
  hostnames:
  - "argocd.${LAB_DOMAIN}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: argocd-server
      port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitea-route
  namespace: admin-tools
spec:
  parentRefs:
  - name: main-gateway
    namespace: admin-tools
  hostnames:
  - "gitea.${LAB_DOMAIN}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: gitea-http
      port: 3000

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-route
  namespace: admin-tools
spec:
  parentRefs:
  - name: main-gateway
    namespace: admin-tools
  hostnames:
  - "harbor.${LAB_DOMAIN}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    # With expose.type=clusterIP the Harbor chart's entry Service is `harbor`
    # (the nginx component) — it fronts the portal UI, the core API, AND the
    # registry /v2/ API. Do NOT point at `harbor-portal`: that Service only
    # serves the UI SPA, so `docker push` (Day 1 lab) would 404.
    - name: harbor
      port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: admin-tools
spec:
  parentRefs:
  - name: main-gateway
    namespace: admin-tools
  hostnames:
  - "grafana.${LAB_DOMAIN}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: loki-stack-grafana
      port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm-route
  namespace: admin-tools
spec:
  parentRefs:
  - name: main-gateway
    namespace: admin-tools
  hostnames:
  - "ai.${LAB_DOMAIN}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: litellm
      port: 4000

---
# [Boatswain] Rancher route — was missing from original file, now added.
# Rancher runs with --no-cacerts so it doesn't conflict with edge TLS termination.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rancher-route
  namespace: cattle-system
spec:
  parentRefs:
  - name: main-gateway
    namespace: admin-tools
  hostnames:
  - "rancher.${LAB_DOMAIN}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: rancher
      port: 80

# ── Routes that live with their app manifests (NOT here) ─────────────────────
# Plain-manifest apps carry their own HTTPRoute alongside their Deployment +
# Service. This file only carries routes for Helm-deployed apps (which can't
# easily ship an HTTPRoute) plus litellm. App-owned routes:
#   - docs.${LAB_DOMAIN}    → k8s/core-tools/mkdocs.yaml    (Service: docs-hub)
#   - mailpit.${LAB_DOMAIN} → k8s/core-tools/mailpit.yaml   (Service: mailpit)
#   - db.${LAB_DOMAIN}      → k8s/core-tools/adminer.yaml   (Service: adminer)
#   - poll.${LAB_DOMAIN}    → k8s/core-tools/quiz-app.yaml  (Service: flash-poll)
#
# REMOVED (do not re-add): duplicate `docs-route` and `mailpit-route` blocks
# once lived here. They were exact metadata.name collisions with the canonical
# definitions in mkdocs.yaml / mailpit.yaml — and the docs one pointed at a
# non-existent `mkdocs` Service (the real Service is `docs-hub`). The legacy
# `quiz-route` (non-existent `quiz-app` Service) was likewise removed.
