# [Boatswain] The App Team's Routing Definitions
#
# Decision: Since we disabled the built-in legacy Ingress objects in our Helm charts,
# we manually define HTTPRoute objects here. This physically demonstrates the
# separation of concerns: Infrastructure manages the Gateway, Apps manage the HTTPRoute.
#
# All routes attach to the main-gateway in admin-tools namespace.
# The gateway handles both HTTP (80) and HTTPS (443) via the wildcard-tls cert.
# Each route needs only one parentRef — the gateway listener selection is automatic.
#
# ⚠️  PORTABILITY: Do NOT apply this file directly with kubectl.
# Use: just deploy-core   (which pipes through envsubst to inject LAB_DOMAIN)

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
  - name: main-gateway
    namespace: admin-tools
  hostnames:
  - "argocd.${LAB_DOMAIN}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: argocd-server
      port: 80

