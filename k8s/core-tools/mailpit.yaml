apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: admin-tools
  labels:
    app: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
      - name: mailpit
        image: axllent/mailpit:latest
        ports:
        - containerPort: 8025
          name: ui
        - containerPort: 1025
          name: smtp
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: admin-tools
spec:
  selector:
    app: mailpit
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8025
      name: ui
    - protocol: TCP
      port: 1025
      targetPort: 1025
      name: smtp
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mailpit-route
  namespace: admin-tools
spec:
  parentRefs:
  - name: main-gateway
  # Canonical hostname is mailpit.${LAB_DOMAIN} — it must match the entry
  # injected into /etc/hosts by setup-client.sh and `just show-hosts`.
  hostnames:
  - "mailpit.${LAB_DOMAIN}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: mailpit
      port: 80
