# ArgoCD Minimal Helm Values
# Decision: Designed for a single-node k3s/k3d environment to minimize overhead.
# By default, ArgoCD deploys in HA mode which consumes significant resources.
# We are disabling HA and utilizing standard Traefik ingress for centralized access.

global:
  domain: argocd.${LAB_DOMAIN}

redis:
  # Decision: Disable HA Redis cluster to save memory
  ha:
    enabled: false

server:
  # Decision: Enable insecure mode because TLS termination is handled by Traefik at the edge
  extraArgs:
    - --insecure

  # Decision: Ingress generation is disabled. We manually define HTTPRoute objects
  # to demonstrate the Gateway API paradigm.
  ingress:
    enabled: false

repoServer:
  # Decision: Lower replica count to 1 since we don't need high availability for a classroom lab
  replicas: 1

applicationSet:
  # Decision: Enable ApplicationSets to allow dynamic generation of student namespaces via GitOps
  enabled: true

# ── SSO via Dex (OIDC) ────────────────────────────────────────
# Point ArgoCD straight at our external Dex. ArgoCD ships its OWN bundled Dex,
# but that only exists to broker UPSTREAM identity providers — we already are
# one, so disable it and wire ArgoCD to Dex as a plain OIDC client.
dex:
  enabled: false

configs:
  cm:
    url: https://argocd.${LAB_DOMAIN}
    # This block is consumed verbatim by the argocd-cm ConfigMap.
    oidc.config: |
      name: Dex
      issuer: https://sso.${LAB_DOMAIN}
      clientID: argocd
      clientSecret: argocd-oidc-secret
      requestedScopes: ["openid", "profile", "email", "groups"]
      # Dex serves the self-signed lab cert — paste certs/ca.crt under a
      # `rootCA: |` key here, or add the lab CA to argocd-server's trust store.
  rbac:
    # Everyone signs in read-only; the 'instructors' Dex group is mapped to admin.
    policy.default: role:readonly
    policy.csv: |
      g, instructors, role:admin

# ── Notifications → Mailpit ───────────────────────────────────
# argocd-notifications ships disabled. Enable the controller, point its email
# service at Mailpit (admin-tools NS — cross-namespace, hence the Service FQDN),
# and register two standard triggers/templates + a default subscription so
# sync/health events actually land in the Mailpit inbox without per-app
# annotations. The {{...}} are Go templates evaluated by ArgoCD, NOT shell vars —
# envsubst leaves them alone (only ${LAB_DOMAIN} is substituted at deploy time).
notifications:
  enabled: true
  notifiers:
    service.email: |
      host: mailpit.admin-tools.svc.cluster.local
      port: 1025
      from: noreply@${LAB_DOMAIN}
      insecure_skip_verify: true
  templates:
    template.app-sync-succeeded: |
      email:
        subject: "ArgoCD: {{.app.metadata.name}} synced"
      message: "Application {{.app.metadata.name}} is now running a new version."
    template.app-health-degraded: |
      email:
        subject: "ArgoCD: {{.app.metadata.name}} health degraded"
      message: "Application {{.app.metadata.name}} health is degraded."
  triggers:
    trigger.on-sync-succeeded: |
      - when: app.status.operationState.phase in ['Succeeded']
        send: [app-sync-succeeded]
    trigger.on-health-degraded: |
      - when: app.status.health.status == 'Degraded'
        send: [app-health-degraded]
  subscriptions:
    - recipients:
        - email:admiral@${LAB_DOMAIN}
      triggers:
        - on-sync-succeeded
        - on-health-degraded
