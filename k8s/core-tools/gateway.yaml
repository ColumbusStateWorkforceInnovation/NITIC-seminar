# [Boatswain] The Infrastructure Team's Gateway Definition
#
# Decision: This file physically provisions the listening ports (80 + 443) on the cluster.
# By decoupling this from the application routes, we demonstrate modern Gateway API architecture.
# Traefik serves as the underlying GatewayClass provider.
#
# TLS Strategy (Lab Mode):
#   We use a self-signed wildcard cert generated by scripts/generate-lab-cert.sh.
#   The cert is issued under the NITIC / Working Connections Fleet CA and is valid
#   for 20 days — the lifetime of the seminar.
#   Students install the CA cert on their VMs via setup-client.sh.
#   No Let's Encrypt or public DNS required.
#
# Prerequisites:
#   kubectl create secret tls wildcard-tls \
#     --cert=certs/tls.crt --key=certs/tls.key \
#     -n admin-tools --dry-run=client -o yaml | kubectl apply -f -

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: admin-tools
spec:
  # Traefik registers 'traefik' as its default GatewayClass.
  gatewayClassName: traefik
  listeners:
  # ── HTTP (port 80) ─────────────────────────────────────────
  # Decision: Keep HTTP open to allow kubectl port-forward debugging and
  # to support any plain-HTTP lab exercises on Day 1.
  - name: web
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All

  # ── HTTPS (port 443) ───────────────────────────────────────
  # Decision: TLS is terminated here at the Gateway edge.
  # The wildcard-tls secret (*.${LAB_DOMAIN}) is loaded from the certs/
  # directory of the repo and covers all lab subdomains.
  # Backend services receive plain HTTP — no end-to-end TLS complexity.
  - name: websecure
    protocol: HTTPS
    port: 443
    tls:
      mode: Terminate
      certificateRefs:
      - name: wildcard-tls
        namespace: admin-tools
    allowedRoutes:
      namespaces:
        from: All
