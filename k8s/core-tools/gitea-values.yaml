# Gitea Minimal Helm Values
# Decision: Designed for a single-node classroom environment.
# Provides the internal GitOps target so students don't need internet access to GitHub.

gitea:
  admin:
    # Decision: Create a default admin user for the instructor.
    username: "admiral"
    password: "${GITEA_ADMIN_PASSWORD}" # injected from lab.env by `just deploy-gitea`
    email: "admiral@bash.local"
  
  config:
    server:
      # Decision: Route via standard ingress
      DOMAIN: "gitea.${LAB_DOMAIN}"
      ROOT_URL: "https://gitea.${LAB_DOMAIN}/"

    # ── Gitea Actions (in-cluster CI) ─────────────────────────
    # Added for the Day 3 closing demo. Workflow files live at .gitea/workflows/
    # in student repos and are picked up by an act_runner pod (deployed
    # separately — Gitea ships the engine, not the runner). The workflow YAML
    # is GitHub-Actions-compatible, so the same .gitea/workflows/ci.yaml runs
    # unchanged on github.com if a student copies it under .github/workflows/.
    #
    # The runner itself is a separate Deployment using the gitea/act_runner
    # image — see docs/missions/day-03/demo-gitea-actions.md → Pre-Flight for
    # the registration token + runner deploy. Keeping the runner out of this
    # chart means student VMs can register their own runners against the same
    # Gitea later without re-templating.
    actions:
      ENABLED: true
      DEFAULT_ACTIONS_URL: "https://gitea.${LAB_DOMAIN}"

    # ── Outbound mail → Mailpit ───────────────────────────────
    # Gitea sends account-activation, password-reset, and issue/PR notification
    # mail here. Mailpit lives in admin-tools (same namespace as Gitea), but we
    # use the full Service FQDN for uniformity with the cross-namespace clients.
    # Plain SMTP, no TLS, no auth — Mailpit accepts anything on :1025.
    mailer:
      ENABLED: true
      PROTOCOL: smtp
      SMTP_ADDR: mailpit.admin-tools.svc.cluster.local
      SMTP_PORT: 1025
      FROM: "noreply@${LAB_DOMAIN}"

  # ── SSO via Dex (OIDC) ──────────────────────────────────────
  # Auto-registers a "Dex" login source on startup, so students click
  # "Sign in with Dex" instead of using a Gitea-local password. The key/secret
  # must match the `gitea` staticClient in k8s/core-tools/dex.yaml.
  # NOTE: Gitea verifies Dex's TLS cert when it fetches the discovery URL, so
  # the lab CA (certs/ca.crt) must be trusted by the Gitea container — see the
  # Day 3 SSO walkthrough for the extraVolumeMounts that handle that.
  oauth:
    - name: "Dex"
      provider: "openidConnect"
      key: "gitea"
      secret: "gitea-oidc-secret"
      autoDiscoverUrl: "https://sso.${LAB_DOMAIN}/.well-known/openid-configuration"

redis-cluster:
  # Decision: Disable HA Redis to save resources
  enabled: false
redis:
  enabled: true
  architecture: standalone

postgresql:
  # Decision: Disable HA PostgreSQL
  architecture: standalone

# Decision: Ingress generation is disabled. We manually define HTTPRoute objects
# to demonstrate the Gateway API paradigm.
ingress:
  enabled: false
