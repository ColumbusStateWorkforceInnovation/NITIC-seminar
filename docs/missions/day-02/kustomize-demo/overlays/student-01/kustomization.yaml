# Overlay for a single student.
# namespace + namePrefix is the trick that makes per-student environments free.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: blackbeard
namePrefix: blackbeard-

resources:
  - ../../base

images:
  - name: harbor.lab.local/raft-fleet/raft
    newTag: v1.2

patches:
  - path: replicas-patch.yaml
    target:
      kind: Deployment
      name: raft
