# Example CI workflow — runs in Gitea Actions via the in-cluster act_runner.
#
# This file lives at .gitea/workflows/ci.yaml in a student repo (Gitea looks
# under .gitea/workflows the same way GitHub looks under .github/workflows).
# The YAML below is intentionally GitHub-Actions-compatible — copy it into a
# .github/workflows/ folder on github.com and it runs there too.
name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          # vars.LAB_DOMAIN is set as an organisation-level variable in Gitea.
          # Per-org variables come from the Gitea admin UI under Settings → Actions.
          registry: harbor.${{ vars.LAB_DOMAIN }}
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            harbor.${{ vars.LAB_DOMAIN }}/raft-fleet/raft:${{ github.sha }}
            harbor.${{ vars.LAB_DOMAIN }}/raft-fleet/raft:latest
          # cache-from / cache-to omitted intentionally — the in-cluster runner
          # already has the layer cache mounted from a persistent volume.
